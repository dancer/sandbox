name: live

on:
  workflow_dispatch:

jobs:
  providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun run verify:providers
        env:
          BL_API_KEY: ${{ secrets.BL_API_KEY }}
          BL_CLIENT_CREDENTIALS: ${{ secrets.BL_CLIENT_CREDENTIALS }}
          BL_REGION: ${{ secrets.BL_REGION }}
          BL_WORKSPACE: ${{ secrets.BL_WORKSPACE }}
          CLOUDFLARE_SANDBOX_TOKEN: ${{ secrets.CLOUDFLARE_SANDBOX_TOKEN }}
          CLOUDFLARE_SANDBOX_PREVIEW_HOST: ${{ secrets.CLOUDFLARE_SANDBOX_PREVIEW_HOST }}
          CLOUDFLARE_SANDBOX_WORKER_URL: ${{ secrets.CLOUDFLARE_SANDBOX_WORKER_URL }}
          CSB_API_KEY: ${{ secrets.CSB_API_KEY }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
