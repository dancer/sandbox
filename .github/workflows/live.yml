name: live

on:
  workflow_dispatch:

jobs:
  providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun run test:live
        env:
          CLOUDFLARE_SANDBOX_TOKEN: ${{ secrets.CLOUDFLARE_SANDBOX_TOKEN }}
          CLOUDFLARE_SANDBOX_WORKER_URL: ${{ secrets.CLOUDFLARE_SANDBOX_WORKER_URL }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_JWT_TOKEN: ${{ secrets.DAYTONA_JWT_TOKEN }}
          DAYTONA_ORGANIZATION_ID: ${{ secrets.DAYTONA_ORGANIZATION_ID }}
          DAYTONA_TARGET: ${{ secrets.DAYTONA_TARGET }}
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
